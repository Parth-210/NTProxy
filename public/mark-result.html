<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance Result — NTProxy</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .result-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    .result-card {
      width:100%; max-width:440px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 3rem 2rem;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .result-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 1.5rem;
    }
    .result-icon.success { background: rgba(16,185,129,0.15); border: 2px solid var(--success); animation: pop 0.4s ease; }
    .result-icon.error   { background: rgba(239,68,68,0.15);  border: 2px solid var(--danger); }
    @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.75rem; }
    .result-title.success { color: var(--success-light); }
    .result-title.error   { color: var(--danger-light); }
    .result-message { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.6; }
    .confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .confetti .c { position:absolute; top:-10px; width:8px; height:8px; border-radius:50%; opacity:0; animation: fall linear forwards; }
    @keyframes fall {
      0%   { opacity:1; transform: translateY(0) rotate(0deg); }
      100% { opacity:0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>
  <div id="confetti-container" class="confetti"></div>

  <div class="result-page">
    <div class="result-card">
      <div id="result-icon" class="result-icon success">✓</div>
      <h1 id="result-title" class="result-title success">Attendance Marked!</h1>
      <p id="result-message" class="result-message">Your attendance has been recorded successfully.</p>
      <div style="display:flex; flex-direction:column; gap:0.75rem;">
        <a href="/student/dashboard" class="btn btn-primary btn-full btn-lg">Go to Dashboard</a>
        <a href="/student/attendance" class="btn btn-ghost btn-full">View Attendance History</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const status  = params.get('status') || 'error';
    const message = params.get('message') || 'Something went wrong.';

    const iconEl  = document.getElementById('result-icon');
    const titleEl = document.getElementById('result-title');
    const msgEl   = document.getElementById('result-message');

    if (status === 'success') {
      iconEl.textContent  = '✓';
      iconEl.className    = 'result-icon success';
      titleEl.textContent = 'Attendance Marked!';
      titleEl.className   = 'result-title success';
      spawnConfetti();
    } else {
      iconEl.textContent  = '✕';
      iconEl.className    = 'result-icon error';
      titleEl.textContent = 'Oops!';
      titleEl.className   = 'result-title error';
      document.getElementById('confetti-container').remove();
    }
    msgEl.textContent = message;

    function spawnConfetti() {
      const colors = ['#6366f1','#10b981','#f59e0b','#ef4444','#a78bfa','#34d399'];
      const container = document.getElementById('confetti-container');
      for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'c';
        el.style.cssText = `
          left:${Math.random()*100}%;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
          animation-duration:${1.5+Math.random()*2}s;
          animation-delay:${Math.random()*0.8}s;
        `;
        container.appendChild(el);
      }
    }
  </script>
</body>
</html>
